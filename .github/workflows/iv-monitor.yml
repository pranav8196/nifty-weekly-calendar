name: NIFTY IV Calendar Spread Monitor

on:
  workflow_dispatch:  # Triggered by cron-job.org at 9:25 AM IST Mon–Fri; also allows manual runs

jobs:
  iv-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run IV monitor (9:25 AM – ~11:15 AM IST)
        id: run_iv_monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          timeout 5700 python -u nifty_iv_monitor.py
          exit_code=$?
          if [ $exit_code -eq 124 ]; then
            echo "Session ended: 95-minute timeout reached (normal)."
            exit 0
          fi
          exit $exit_code

      - name: Notify on unexpected crash
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=NIFTY Calendar Strategy — IV Monitor session crashed unexpectedly. Check GitHub Actions logs."
